<!DOCTYPE html>
<html
        layout:decorate="~{layouts/layout}"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org">
<!-- 사용자CSS 추가-->
<th:block layout:fragment="css">
    <style>
        .error {
            color: #bd2130;
        }
    </style>
</th:block>
<div layout:fragment="content">
    <form action="/members/login" method="post" role="form" th:action="@{/members/login}">
        <div class="form-group">
            <label th:for="email">이메일주소</label>
            <input class="form-control" name="email" placeholder="이메일을 입력해주세요" type="email">
        </div>
        <div class="form-group">
            <label th:for="password">비밀번호</label>
            <input class="form-control" id="password" name="password" placeholder="비밀번호 입력"
                   type="password">
        </div>
        <p class="error" th:if="${loginErrorMsg}" th:text="${loginErrorMsg}"></p>
        <button class="btn btn-primary">로그인</button>
        <button class="btn btn-primary" onClick="location.href='/members/new'" type="button">회원가입
        </button>
        <hr class="my-4">
        <a class="btn btn-warning btn-block" th:href="@{/oauth2/authorization/kakao}">
            카카오로 시작하기
        </a>
        <!--    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">-->
    </form>
</div>
